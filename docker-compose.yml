services:
  db:
    image: postgres:16-alpine
    container_name: sql-task-db
    environment:
      POSTGRES_DB: sqltaskdb
      POSTGRES_USER: tasukuser
      POSTGRES_PASSWORD: taskpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasukuser -d sqltaskdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    container_name: sql-task-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sqltaskdb
      SPRING_DATASOURCE_USERNAME: tasukuser
      SPRING_DATASOURCE_PASSWORD: taskpass
    ports:
      - "8080:8080"

volumes:
  pgdata:
