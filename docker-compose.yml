version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: sql-task-db
    environment:
      POSTGRES_DB: sqltaskdb
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d sqltaskdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
