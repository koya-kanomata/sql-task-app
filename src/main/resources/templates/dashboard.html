<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('ダッシュボード')}"></head>
<body>
<div class="app-wrapper">
    <nav th:replace="~{fragments/layout :: sidebar('dashboard')}"></nav>
    <div class="main-content">
        <header th:replace="~{fragments/layout :: topbar('📊 ダッシュボード')}"></header>
        <div class="page-body">

            <!-- Stat Cards -->
            <div class="stat-grid">
                <div class="stat-card stat-primary">
                    <div class="stat-label">総タスク数</div>
                    <div class="stat-value" th:text="${stats.total}">0</div>
                    <div class="stat-sub">全ステータス合計</div>
                </div>
                <div class="stat-card stat-warning">
                    <div class="stat-label">進行中</div>
                    <div class="stat-value" th:text="${stats.doing}">0</div>
                    <div class="stat-sub">DOING</div>
                </div>
                <div class="stat-card stat-success">
                    <div class="stat-label">完了</div>
                    <div class="stat-value" th:text="${stats.done}">0</div>
                    <div class="stat-sub">DONE</div>
                </div>
                <div class="stat-card stat-danger">
                    <div class="stat-label">期限切れ</div>
                    <div class="stat-value" th:text="${stats.overdue}">0</div>
                    <div class="stat-sub">未完了 &amp; 期限超過</div>
                </div>
            </div>

            <!-- Charts Row -->
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                <div class="card">
                    <div class="card-header">📈 ステータス別タスク数</div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="statusChart"></canvas>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">🎯 優先度別タスク数</div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="priorityChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Recent Tasks -->
            <div class="card">
                <div class="card-header" style="justify-content: space-between;">
                    <span>🕐 最近のタスク（期限順）</span>
                    <a th:href="@{/list}" class="btn btn-outline btn-sm">すべて見る</a>
                </div>
                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                        <tr>
                            <th>タイトル</th>
                            <th>ステータス</th>
                            <th>優先度</th>
                            <th>期限</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="task : ${recentTasks}"
                            th:classappend="${task.overdue} ? 'row-overdue' : (${task.dueSoon} ? 'row-due-soon' : '')">
                            <td>
                                <a th:href="@{'/detail/' + ${task.id}}" th:text="${task.title}"></a>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="'badge-' + ${#strings.toLowerCase(task.status)}"
                                      th:text="${task.status}"></span>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="'badge-' + ${#strings.toLowerCase(task.priority)}"
                                      th:text="${task.priority}"></span>
                            </td>
                            <td>
                                <span th:text="${task.due_date}"></span>
                                <span th:if="${task.overdue}" style="color: var(--danger); font-size: 0.75rem;"> ⚠️ 期限切れ</span>
                                <span th:if="${task.dueSoon and !task.overdue}" style="color: var(--warning); font-size: 0.75rem;"> ⏰ 期限間近</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<div th:replace="~{fragments/layout :: scripts}"></div>

<script th:inline="javascript">
    const statusData = /*[[${chartData.statusLabels}]]*/ [];
    const statusCounts = /*[[${chartData.statusCounts}]]*/ [];
    const priorityData = /*[[${chartData.priorityLabels}]]*/ [];
    const priorityCounts = /*[[${chartData.priorityCounts}]]*/ [];

    const isDark = () => document.documentElement.getAttribute('data-theme') === 'dark';
    const textColor = () => isDark() ? '#94a3b8' : '#64748b';

    // Status Chart (Doughnut)
    const statusCtx = document.getElementById('statusChart').getContext('2d');
    const statusChart = new Chart(statusCtx, {
        type: 'doughnut',
        data: {
            labels: statusData,
            datasets: [{
                data: statusCounts,
                backgroundColor: ['#3b82f6', '#f59e0b', '#10b981', '#ef4444'],
                borderWidth: 2,
                borderColor: isDark() ? '#1e293b' : '#ffffff'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: { color: textColor(), font: { size: 12 }, padding: 12 }
                }
            }
        }
    });

    // Priority Chart (Bar)
    const priorityCtx = document.getElementById('priorityChart').getContext('2d');
    const priorityChart = new Chart(priorityCtx, {
        type: 'bar',
        data: {
            labels: priorityData,
            datasets: [{
                label: 'タスク数',
                data: priorityCounts,
                backgroundColor: ['#ef4444', '#f59e0b', '#10b981'],
                borderRadius: 6
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { color: textColor(), stepSize: 1 },
                    grid: { color: isDark() ? '#334155' : '#e2e8f0' }
                },
                x: {
                    ticks: { color: textColor() },
                    grid: { display: false }
                }
            }
        }
    });
</script>
</body>
</html>
