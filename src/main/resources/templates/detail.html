<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('タスク詳細')}"></head>
<body>
<div class="app-wrapper">
    <nav th:replace="~{fragments/layout :: sidebar('list')}"></nav>
    <div class="main-content">
        <header th:replace="~{fragments/layout :: topbar('📄 タスク詳細')}"></header>
        <div class="page-body">

            <div th:if="${error}" class="alert alert-danger">⚠️ <span th:text="${error}"></span></div>

            <div th:if="${task}" style="max-width: 700px;">
                <!-- Task Detail Card -->
                <div class="card mb-4">
                    <div class="card-header" style="justify-content: space-between;">
                        <span>タスク #<span th:text="${task.id}"></span></span>
                        <div class="d-flex gap-2">
                            <a th:href="@{'/tasks/edit/' + ${task.id}}" class="btn btn-primary btn-sm">✏️ 編集</a>
                            <form th:action="@{'/tasks/delete/' + ${task.id}}" method="post"
                                  onsubmit="return confirm('このタスクを削除しますか？')">
                                <button type="submit" class="btn btn-danger btn-sm">🗑️ 削除</button>
                            </form>
                            <a th:href="@{/list}" class="btn btn-ghost btn-sm">← 一覧へ</a>
                        </div>
                    </div>
                    <div class="card-body">
                        <h2 style="font-size: 1.4rem; font-weight: 700; margin: 0 0 1rem;"
                            th:text="${task.title}"></h2>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                            <div>
                                <div class="form-label">ステータス</div>
                                <span class="badge"
                                      th:classappend="'badge-' + ${#strings.toLowerCase(task.status)}"
                                      th:text="${task.status}"
                                      style="font-size: 0.85rem; padding: 0.3rem 0.75rem;"></span>
                            </div>
                            <div>
                                <div class="form-label">優先度</div>
                                <span class="badge"
                                      th:classappend="'badge-' + ${#strings.toLowerCase(task.priority)}"
                                      th:text="${task.priority}"
                                      style="font-size: 0.85rem; padding: 0.3rem 0.75rem;"></span>
                            </div>
                            <div>
                                <div class="form-label">期限</div>
                                <div style="font-weight: 500;" th:text="${task.due_date != null ? task.due_date : '未設定'}"></div>
                                <div th:if="${task.overdue}" class="text-sm" style="color: var(--danger);">⚠️ 期限切れ</div>
                                <div th:if="${task.dueSoon and !task.overdue}" class="text-sm" style="color: var(--warning);">⏰ 期限間近</div>
                            </div>
                            <div>
                                <div class="form-label">作成日時</div>
                                <div class="text-sm text-muted" th:text="${task.created_at}"></div>
                            </div>
                        </div>

                        <div th:if="${task.description != null and !#strings.isEmpty(task.description)}">
                            <div class="form-label">説明</div>
                            <div style="background: var(--surface-2); border-radius: 0.5rem; padding: 0.75rem 1rem;
                                        white-space: pre-wrap; font-size: 0.875rem; line-height: 1.6;"
                                 th:text="${task.description}"></div>
                        </div>
                    </div>
                </div>

                <!-- Quick SQL for this task -->
                <div class="card">
                    <div class="card-header">💡 このタスクに関するSQL例</div>
                    <div class="card-body">
                        <div class="snippet-list">
                            <button class="snippet-btn"
                                    onclick="fillQuery(this.dataset.sql)"
                                    th:attr="data-sql=|SELECT * FROM tasks WHERE id = ${task.id};|"
                                    th:text="'SELECT * FROM tasks WHERE id = ' + ${task.id} + ';'"></button>
                            <button class="snippet-btn"
                                    onclick="fillQuery(this.dataset.sql)"
                                    th:attr="data-sql=|UPDATE tasks SET status = 'DONE' WHERE id = ${task.id};|"
                                    th:text="'UPDATE tasks SET status = \'DONE\' WHERE id = ' + ${task.id} + ';'"></button>
                            <button class="snippet-btn"
                                    onclick="fillQuery(this.dataset.sql)"
                                    th:attr="data-sql=|UPDATE tasks SET status = 'DOING' WHERE id = ${task.id};|"
                                    th:text="'UPDATE tasks SET status = \'DOING\' WHERE id = ' + ${task.id} + ';'"></button>
                        </div>
                        <div class="mt-3">
                            <a th:href="@{/query}" class="btn btn-outline btn-sm">💻 SQL Consoleで実行</a>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
function fillQuery(sql) {
    sessionStorage.setItem('pendingQuery', sql);
    window.location.href = '/query';
}
</script>
</body>
</html>
