<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Task Detail</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>タスク詳細</h2>

<div class="mb-3">
    <a href="/list" class="btn btn-secondary">一覧へ戻る</a>
</div>

<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

<table th:if="${task}" class="table table-bordered">
    <tr>
        <th>ID</th>
        <td th:text="${task.id}"></td>
    </tr>
    <tr>
        <th>タイトル</th>
        <td th:text="${task.title}"></td>
    </tr>
    <tr>
        <th>ステータス</th>
        <td th:text="${task.status}"></td>
    </tr>
    <tr>
        <th>期限</th>
        <td th:text="${task.due_date}"></td>
    </tr>
</table>

<div class="mt-5 text-end">
    <a href="/query" class="btn btn-link btn-sm p-0 text-secondary" style="font-size: 0.75rem;">SQL Consoleへ戻る</a>
</div>
</body>
</html>
