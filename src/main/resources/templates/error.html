<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="card shadow-sm">
    <div class="card-body">
        <h2 class="card-title text-danger">エラーが発生しました</h2>

        <div class="alert alert-warning mt-3">
            <div><strong>Status:</strong> <span th:text="${status}">404</span></div>
            <div><strong>Error:</strong> <span th:text="${error}">Not Found</span></div>
            <div th:if="${path}"><strong>Path:</strong> <span th:text="${path}">/</span></div>
            <div th:if="${message}"><strong>Message:</strong> <span th:text="${message}">There was an unexpected error</span></div>
        </div>

        <p class="mb-3">
            URLが間違っているか、まだ画面が用意されていない可能性があります。
        </p>

        <div class="d-flex gap-2">
            <a href="/" class="btn btn-primary">タスク一覧へ戻る</a>
            <a href="/query" class="btn btn-outline-primary">SQL Console</a>
            <a href="/history" class="btn btn-outline-secondary">SQL履歴</a>
        </div>
    </div>
</div>
</body>
</html>
