<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('エラー')}"></head>
<body>
<div class="app-wrapper">
    <nav th:replace="~{fragments/layout :: sidebar('')}"></nav>
    <div class="main-content">
        <header th:replace="~{fragments/layout :: topbar('⚠️ エラー')}"></header>
        <div class="page-body">
            <div style="max-width: 600px; margin: 2rem auto;">
                <div class="card">
                    <div class="card-body" style="text-align: center; padding: 3rem 2rem;">
                        <div style="font-size: 4rem; margin-bottom: 1rem;">😵</div>
                        <h2 style="font-size: 1.5rem; font-weight: 700; color: var(--danger); margin-bottom: 0.5rem;">
                            エラーが発生しました
                        </h2>
                        <div class="alert alert-warning mt-4" style="text-align: left;">
                            <div><strong>Status:</strong> <span th:text="${status}">500</span></div>
                            <div><strong>Error:</strong> <span th:text="${error}">Internal Server Error</span></div>
                            <div th:if="${path}"><strong>Path:</strong> <span th:text="${path}">/</span></div>
                            <div th:if="${message}"><strong>Message:</strong> <span th:text="${message}"></span></div>
                        </div>
                        <p class="text-muted text-sm mt-3">
                            URLが間違っているか、まだ画面が用意されていない可能性があります。
                        </p>
                        <div class="d-flex gap-2 mt-4" style="justify-content: center;">
                            <a href="/" class="btn btn-primary">📊 ダッシュボードへ</a>
                            <a href="/query" class="btn btn-outline">💻 SQL Console</a>
                            <a href="/list" class="btn btn-outline">📋 タスク一覧</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
