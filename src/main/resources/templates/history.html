<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('SQL履歴')}"></head>
<body>
<div class="app-wrapper">
    <nav th:replace="~{fragments/layout :: sidebar('history')}"></nav>
    <div class="main-content">
        <header th:replace="~{fragments/layout :: topbar('🕐 SQL 実行履歴')}"></header>
        <div class="page-body">

            <!-- Filter Bar -->
            <form method="get" th:action="@{/history}" class="card mb-4">
                <div class="card-body" style="padding: 0.75rem 1.25rem;">
                    <div class="filter-bar">
                        <input type="text" name="search" class="form-control"
                               placeholder="🔍 SQLで検索..."
                               th:value="${param.search}"
                               style="min-width: 250px;">
                        <select name="outcome" class="form-control">
                            <option value="">すべての結果</option>
                            <option value="SELECT" th:selected="${param.outcome == 'SELECT'}">SELECT</option>
                            <option value="更新"   th:selected="${param.outcome == '更新'}">更新</option>
                            <option value="エラー" th:selected="${param.outcome == 'エラー'}">エラー</option>
                        </select>
                        <button type="submit" class="btn btn-primary btn-sm">絞り込む</button>
                        <a th:href="@{/history}" class="btn btn-ghost btn-sm">リセット</a>
                        <form th:action="@{/history/clear}" method="post" style="margin-left: auto;"
                              onsubmit="return confirm('履歴をすべて削除しますか？')">
                            <button type="submit" class="btn btn-danger btn-sm">🗑️ 履歴を全削除</button>
                        </form>
                    </div>
                </div>
            </form>

            <!-- History Table -->
            <div class="card">
                <div class="card-header" style="justify-content: space-between;">
                    <span>実行履歴</span>
                    <span class="text-muted text-sm" th:text="${history.size()} + ' 件'"></span>
                </div>

                <div th:if="${history.isEmpty()}" class="card-body">
                    <div class="alert alert-info mb-0">
                        📭 まだSQL実行履歴はありません。SQL Consoleでクエリを実行してみましょう。
                    </div>
                </div>

                <div th:if="${!history.isEmpty()}" style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                        <tr>
                            <th style="width: 150px;">実行時刻</th>
                            <th>SQL</th>
                            <th style="width: 150px;">結果</th>
                            <th style="width: 100px;">実行時間</th>
                            <th style="width: 80px;">操作</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="entry : ${history}">
                            <td class="text-xs text-muted" th:text="${entry.executedAt}"></td>
                            <td>
                                <div class="history-query" th:text="${entry.query}"></div>
                            </td>
                            <td>
                                <span th:if="${#strings.startsWith(entry.outcome, 'SELECT')}"
                                      class="badge badge-todo" th:text="${entry.outcome}"></span>
                                <span th:if="${#strings.startsWith(entry.outcome, '更新')}"
                                      class="badge badge-done" th:text="${entry.outcome}"></span>
                                <span th:if="${#strings.startsWith(entry.outcome, 'エラー')}"
                                      class="badge badge-blocked" th:text="${entry.outcome}"></span>
                                <span th:if="${!#strings.startsWith(entry.outcome, 'SELECT') and !#strings.startsWith(entry.outcome, '更新') and !#strings.startsWith(entry.outcome, 'エラー')}"
                                      class="text-xs text-muted" th:text="${entry.outcome}"></span>
                            </td>
                            <td class="text-xs text-muted" th:text="${entry.executionTime}"></td>
                            <td>
                                <form th:action="@{/execute}" method="post">
                                    <input type="hidden" name="returnPage" value="index">
                                    <input type="hidden" name="query" th:value="${entry.query}">
                                    <button type="submit" class="btn btn-outline btn-sm history-rerun-btn"
                                            title="このSQLを再実行">▶ 再実行</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
