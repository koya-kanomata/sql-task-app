<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SQL History</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>SQL履歴</h2>

<div class="mb-3">
    <a href="/" class="btn btn-outline-primary">タスク一覧を見る</a>
</div>

<div th:if="${#lists.isEmpty(history)}" class="alert alert-info">
    まだSQLの実行履歴はありません。
</div>

<table th:if="${!#lists.isEmpty(history)}" class="table table-striped table-bordered">
    <thead class="table-dark">
    <tr>
        <th>実行時刻</th>
        <th>SQL</th>
        <th>結果</th>
        <th>実行時間</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="entry : ${history}">
        <td th:text="${entry.executedAt}"></td>
        <td style="white-space: pre-wrap; word-break: break-word;" th:text="${entry.query}"></td>
        <td th:text="${entry.outcome}"></td>
        <td th:text="${entry.executionTime}"></td>
    </tr>
    </tbody>
</table>

<hr class="my-4">

<h3>SQL Console</h3>

<form th:action="@{/execute}" method="post" class="mb-4">
    <input type="hidden" name="returnPage" value="history">
    <div class="mb-3">
        <textarea name="query" class="form-control" rows="5"
                  placeholder="SQLを入力してください (e.g. SELECT * FROM tasks;)"
                  th:text="${previousQuery}"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">SQL実行</button>
</form>

<div th:if="${executionTime}" class="alert alert-secondary">
    実行時間: <span th:text="${executionTime}"></span>
</div>

<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

<table th:if="${results}" class="table table-striped table-bordered mt-3">
    <thead class="table-dark">
    <tr>
        <th th:each="col : ${columns}" th:text="${col}"></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="row : ${results}">
        <td th:each="col : ${columns}" th:text="${row.get(col)}"></td>
    </tr>
    </tbody>
</table>

<div class="mt-5 text-end">
    <a href="/query" class="btn btn-link btn-sm p-0 text-secondary" style="font-size: 0.75rem;">SQL Consoleへ戻る</a>
</div>
</body>
</html>
