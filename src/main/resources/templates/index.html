<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SQL Task Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>SQL Console</h2>

<!-- SQL入力フォーム -->
<form th:action="@{/execute}" method="post" class="mb-4">
    <div class="mb-3">
            <textarea name="query" class="form-control" rows="5"
                      placeholder="SQLを入力してください (e.g. SELECT * FROM tasks;)"
                      th:text="${previousQuery}"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">SQL実行</button>
</form>

<!-- 実行時間などのメタ情報 -->
<div th:if="${executionTime}" class="alert alert-secondary">
    実行時間: <span th:text="${executionTime}"></span>
</div>

<!-- エラー表示 -->
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

<!-- 更新メッセージ -->
<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

<!-- SELECT結果の動的テーブル表示 -->
<table th:if="${results}" class="table table-striped table-bordered mt-3">
    <thead class="table-dark">
    <tr>
        <th th:each="col : ${columns}" th:text="${col}"></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="row : ${results}">
        <td th:each="col : ${columns}" th:text="${row.get(col)}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
