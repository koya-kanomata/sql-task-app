<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('タスク一覧')}"></head>
<body>
<div class="app-wrapper">
    <nav th:replace="~{fragments/layout :: sidebar('list')}"></nav>
    <div class="main-content">
        <header th:replace="~{fragments/layout :: topbar('📋 タスク一覧')}"></header>
        <div class="page-body">

            <!-- Filter Bar -->
            <form method="get" th:action="@{/list}" class="card mb-4">
                <div class="card-body" style="padding: 0.75rem 1.25rem;">
                    <div class="filter-bar">
                        <input type="text" name="search" class="form-control"
                               placeholder="🔍 タイトルで検索..."
                               th:value="${param.search}"
                               style="min-width: 200px;">
                        <select name="status" class="form-control">
                            <option value="">すべてのステータス</option>
                            <option value="TODO"    th:selected="${param.status == 'TODO'}">TODO</option>
                            <option value="DOING"   th:selected="${param.status == 'DOING'}">DOING</option>
                            <option value="DONE"    th:selected="${param.status == 'DONE'}">DONE</option>
                            <option value="BLOCKED" th:selected="${param.status == 'BLOCKED'}">BLOCKED</option>
                        </select>
                        <select name="priority" class="form-control">
                            <option value="">すべての優先度</option>
                            <option value="HIGH"   th:selected="${param.priority == 'HIGH'}">HIGH</option>
                            <option value="MEDIUM" th:selected="${param.priority == 'MEDIUM'}">MEDIUM</option>
                            <option value="LOW"    th:selected="${param.priority == 'LOW'}">LOW</option>
                        </select>
                        <select name="sort" class="form-control">
                            <option value="id"       th:selected="${param.sort == 'id' or param.sort == null}">ID順</option>
                            <option value="due_date" th:selected="${param.sort == 'due_date'}">期限順</option>
                            <option value="priority" th:selected="${param.sort == 'priority'}">優先度順</option>
                            <option value="status"   th:selected="${param.sort == 'status'}">ステータス順</option>
                        </select>
                        <button type="submit" class="btn btn-primary btn-sm">絞り込む</button>
                        <a th:href="@{/list}" class="btn btn-ghost btn-sm">リセット</a>
                        <a th:href="@{/tasks/new}" class="btn btn-success btn-sm" style="margin-left: auto;">➕ タスク追加</a>
                    </div>
                </div>
            </form>

            <!-- Task Table -->
            <div class="card">
                <div class="card-header" style="justify-content: space-between;">
                    <span>タスク一覧</span>
                    <span class="text-muted text-sm" th:text="${tasks.size()} + ' 件'"></span>
                </div>
                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                        <tr>
                            <th style="width: 50px;">ID</th>
                            <th>タイトル</th>
                            <th style="width: 100px;">ステータス</th>
                            <th style="width: 90px;">優先度</th>
                            <th style="width: 120px;">期限</th>
                            <th style="width: 120px;">操作</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${tasks.isEmpty()}">
                            <td colspan="6" style="text-align: center; color: var(--text-muted); padding: 2rem;">
                                タスクが見つかりませんでした
                            </td>
                        </tr>
                        <tr th:each="task : ${tasks}"
                            th:classappend="${task.overdue} ? 'row-overdue' : (${task.dueSoon} ? 'row-due-soon' : '')">
                            <td class="text-muted text-sm" th:text="${task.id}"></td>
                            <td>
                                <a th:href="@{'/detail/' + ${task.id}}" th:text="${task.title}"
                                   style="font-weight: 500;"></a>
                                <div th:if="${task.description != null and !#strings.isEmpty(task.description)}"
                                     class="text-xs text-muted mt-1"
                                     th:text="${#strings.abbreviate(task.description, 60)}"></div>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="'badge-' + ${#strings.toLowerCase(task.status)}"
                                      th:text="${task.status}"></span>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="'badge-' + ${#strings.toLowerCase(task.priority)}"
                                      th:text="${task.priority}"></span>
                            </td>
                            <td>
                                <span th:text="${task.due_date != null ? task.due_date : '-'}"></span>
                                <span th:if="${task.overdue}" title="期限切れ" style="color: var(--danger);">⚠️</span>
                                <span th:if="${task.dueSoon and !task.overdue}" title="期限間近" style="color: var(--warning);">⏰</span>
                            </td>
                            <td>
                                <div class="d-flex gap-2">
                                    <a th:href="@{'/tasks/edit/' + ${task.id}}" class="btn btn-outline btn-sm">編集</a>
                                    <form th:action="@{'/tasks/delete/' + ${task.id}}" method="post"
                                          onsubmit="return confirm('このタスクを削除しますか？')">
                                        <button type="submit" class="btn btn-danger btn-sm">削除</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- CSV Export -->
            <div class="mt-3 text-sm text-muted">
                <a th:href="@{/list/export}" class="btn btn-ghost btn-sm">📥 CSVエクスポート</a>
            </div>

        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
